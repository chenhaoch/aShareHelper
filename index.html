<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A股盯盘</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="app">
        <header class="app-header">
            <h1>📊 A股盯盘 <span class="time" id="headerTime">--:--:--</span>
                <span class="header-links">
                    <a href="sector-editor.html" target="_blank">📋 板块维护</a>
                </span>
            </h1>
        </header>

        <div class="index-grid" id="indexGrid">
            <div class="index-card" data-code="000001">
                <div class="card-header">
                    <span class="name">上证指数</span>
                    <span class="sub" id="sub_000001"></span>
                </div>
                <div class="chart-container" id="chart_000001"></div>
                <div class="legend"></div>
            </div>
            <div class="index-card" data-code="399006">
                <div class="card-header">
                    <span class="name">创业板指</span>
                    <span class="sub" id="sub_399006"></span>
                </div>
                <div class="chart-container" id="chart_399006"></div>
                <div class="legend"></div>
            </div>
            <div class="index-card" data-code="000688">
                <div class="card-header">
                    <span class="name">科创50</span>
                    <span class="sub" id="sub_000688"></span>
                </div>
                <div class="chart-container" id="chart_000688"></div>
                <div class="legend"></div>
            </div>
            <div class="index-card" data-code="800004">
                <div class="card-header">
                    <span class="name" id="name_800004">全A成交额</span>
                    <span class="sub" id="sub_800004"></span>
                </div>
                <div class="chart-container" id="chart_800004"></div>
                <div class="legend"></div>
            </div>
        </div>

        <div class="change-area">
            <div class="change-sidebar">
                <div class="change-panel" id="panelZDFB">
                    <div class="panel-title" id="zdfbTitle">📊 涨跌分布</div>
                    <div class="zdfb-chart" id="zdfbChart"></div>
                </div>
                <div class="change-panel" id="panelZDT">
                    <div class="panel-title" id="zdtTitle">📈 涨跌停趋势</div>
                    <div class="zdt-chart" id="zdtChart"></div>
                </div>
                <div class="change-panel" id="panelAuction">
                    <div class="panel-title">
                        <span>🔥 竞价涨停</span>
                        <span class="badge" id="auctionCount">0 条</span>
                    </div>
                    <div class="change-list" id="auctionList">
                        <div class="change-empty">暂无竞价涨停数据</div>
                    </div>
                </div>
            </div>
            <div class="change-main">
                <div class="change-panel" id="panelIntraday">
                    <div class="panel-title">
                        <span>⚡ 盘中异动</span>
                        <span class="badge" id="intradayCount">0 条</span>
                    </div>
                    <div class="change-list" id="intradayList">
                        <div class="change-empty">暂无盘中异动数据</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 图表库 CDN -->
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>

    <!-- 核心模块 -->
    <script src="js/core/constants.js"></script>
    <script src="js/core/event-bus.js"></script>
    <script src="js/core/state.js"></script>

    <!-- 渲染模块 -->
    <script src="js/render/chart-renderer.js"></script>
    <script src="js/render/index-cards.js"></script>
    <script src="js/render/change-list.js"></script>
    <script src="js/render/market-stats.js"></script>

    <!-- 数据模块 -->
    <script src="js/data/index-data.js"></script>
    <script src="js/data/change-data.js"></script>
    <script src="js/data/storage.js"></script>
    <script src="js/data/sector-data.js"></script>
    <script src="js/data/market-stats.js"></script>

    <!-- 启动入口 -->
    <script src="js/app.js"></script>
</body>
</html>
