<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>板块维护 - A股盯盘</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="app editor-app">
        <div class="editor-header">
            <h1>📋 板块维护</h1>
            <a href="index.html" class="back-link">← 返回盯盘页</a>
        </div>

        <div class="editor-grid">
            <!-- 面板1：韭研公社导入 -->
            <div class="editor-panel">
                <div class="panel-title">🔄 韭研公社导入</div>
                <div class="form-row" style="align-items: stretch;">
                    <div class="form-group" style="flex: 0 0 140px; margin-bottom: 0;">
                        <label>日期</label>
                        <input type="date" id="jiuyanDate" />
                    </div>
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label>JSON（从 DevTools → Network 复制）</label>
                        <input type="text" id="jiuyanJsonInput" placeholder='{"data":[{"action_field_id":"...","name":"机器人","list":[...]}]}' />
                    </div>
                    <div class="form-group" style="flex: 0 0 auto; margin-bottom: 0;">
                        <button class="btn btn-primary" id="btnParseJiuyan" style="margin-top:16px;">导入</button>
                    </div>
                </div>
                <div id="jiuyanResult" class="result-box" style="display:none;"></div>
            </div>

            <!-- 面板2：手动录入 -->
            <div class="editor-panel">
                <div class="panel-title">✏️ 手动录入</div>
                <div class="form-row" style="margin-bottom:4px;">
                    <div class="form-group" style="flex: 0 0 90px; margin-bottom: 0;">
                        <label>代码</label>
                        <input type="text" id="manualCode" placeholder="603137" maxlength="6" />
                    </div>
                    <div class="form-group" style="flex: 0 0 100px; margin-bottom: 0;">
                        <label>名称</label>
                        <input type="text" id="manualName" placeholder="个股名称" />
                    </div>
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label>板块（逗号分隔）</label>
                        <input type="text" id="manualSectorsInput" placeholder="机器人,建筑节能,光伏" />
                    </div>
                    <div class="form-group" style="flex: 0 0 auto; margin-bottom: 0;">
                        <button class="btn btn-success" id="btnSaveManual" style="margin-top:16px;">保存</button>
                    </div>
                </div>
                <div class="tag-list" id="manualTagList"></div>
                <span id="manualSaveResult" style="font-size: 11px;"></span>
            </div>

            <!-- 面板3：已维护列表 -->
            <div class="editor-panel full">
                <div class="panel-title">
                    📂 已维护个股板块
                    <span class="badge" id="maintainedCount">0 只</span>
                </div>
                <div class="search-bar">
                    <input type="text" id="searchMaintained" placeholder="搜索代码或板块名称..." />
                    <button class="btn btn-default" id="btnRefreshList">刷新</button>
                </div>
                <div class="scrollable-table" id="maintainedTableWrapper">
                    <table class="sector-table" id="maintainedTable">
                        <thead>
                            <tr>
                                <th style="width:66px;">代码</th>
                                <th style="width:70px;">名称</th>
                                <th>板块标签</th>
                                <th style="width:130px;">更新时间</th>
                                <th style="width:90px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="maintainedTbody">
                        </tbody>
                    </table>
                </div>
                <div class="empty-state" id="maintainedEmpty" style="display:none;">暂无已维护数据</div>
            </div>
        </div>
    </div>

    <!-- 核心模块 -->
    <script src="js/core/constants.js"></script>
    <script src="js/core/event-bus.js"></script>
    <script src="js/core/state.js"></script>
    <!-- 数据模块 -->
    <script src="js/data/storage.js"></script>
    <script src="js/data/sector-data.js"></script>
    <!-- 页面入口 -->
    <script src="js/pages/sector-editor.js"></script>
</body>
</html>
