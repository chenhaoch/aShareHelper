<script src="https://cdnjs.cloudflare.com/ajax/libs/spark-md5/3.0.2/spark-md5.min.js"></script>
<script>
function md5Hash(input, options = {}) {
  if (input == null) {
    throw new Error('Illegal argument ' + input);
  }

  // 1. 转为 ArrayBuffer
  let buffer;
  if (typeof input === 'string') {
    buffer = new TextEncoder().encode(input).buffer;   // UTF-8 编码
  } else if (input instanceof ArrayBuffer) {
    buffer = input;
  } else if (Array.isArray(input) || input instanceof Uint8Array) {
    buffer = new Uint8Array(input).buffer;
  } else {
    buffer = new TextEncoder().encode(String(input)).buffer;
  }

  // 2. 计算 MD5（只调用一次 end）
  const spark = new SparkMD5.ArrayBuffer();
  spark.append(buffer);
  const rawBinary = spark.end(true);   // 原始二进制字符串（16 字节）

  // 3. 根据选项返回
  if (options.asBytes) {
    return Array.from(rawBinary, ch => ch.charCodeAt(0));
  }

  if (options.asString) {
    return rawBinary;                  // 长度 16 的二进制字符串
  }

  // 默认：十六进制（小写，32 位）
  return Array.from(rawBinary, ch => ch.charCodeAt(0)
    .toString(16)
    .padStart(2, '0')
  ).join('');
}

// ---------- 测试 ----------
console.log(md5Hash('Uu0KfOB8iUP69d3c:' + new Date().getTime()));
// 应输出：某个 32 位 hex（非空）
</script>
